<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOM! - 宏伟战场正式版</title>
    <style>
        :root {
            --primary: #4ecca3;
            --accent: #f1c40f;
            --danger: #e94560;
            --bg-dark: #1a1a2e;
            --panel-bg: rgba(22, 33, 62, 0.92);
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: var(--bg-dark);
            color: white; 
            font-family: var(--font-main);
            overflow: hidden; 
        }

        /* 动态背景动画 */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #16213e 0%, #1a1a2e 100%);
            z-index: -2;
        }

        .bg-bubbles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
        }

        /* 主入口菜单容器 */
        #mainMenu {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-area { text-align: center; margin-bottom: 60px; animation: slideDown 0.8s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area h1 { 
            font-size: 84px; margin: 0; font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(78, 204, 163, 0.4));
            letter-spacing: 12px;
        }

        .logo-area p { color: #888; font-size: 18px; letter-spacing: 8px; margin-top: 10px; }

        /* 关卡卡片列表 */
        .level-card-list { display: flex; gap: 30px; }

        .level-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px 30px; border-radius: 24px; width: 220px;
            text-align: center; transition: all 0.4s; cursor: pointer;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }

        .level-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary); transform: scaleX(0); transition: 0.4s;
        }

        .level-card:hover {
            background: rgba(78, 204, 163, 0.08);
            border-color: var(--primary);
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .level-card:hover::before { transform: scaleX(1); }

        .level-card i { font-size: 50px; display: block; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .level-card h3 { margin: 10px 0; font-size: 22px; color: #fff; }
        .level-card span { font-size: 13px; color: #aaa; line-height: 1.6; }

        /* 游戏界面布局 */
        .game-container { 
            display: none; 
            position: relative; 
            gap: 30px; 
            padding: 30px;
            background: var(--panel-bg);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas { 
            border: 4px solid var(--primary); 
            background: #111; 
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        /* 侧边面板 */
        .panel { 
            width: 200px; 
            display: flex; flex-direction: column;
        }

        .section-title {
            font-size: 14px; color: var(--primary); font-weight: bold;
            letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center;
            gap: 8px;
        }

        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(78, 204, 163, 0.2); }

        /* 状态卡片 */
        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 16px; border-radius: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.06); }

        .stat-label { font-size: 12px; color: #777; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 24px; color: #fff; font-weight: 800; font-family: 'Courier New', Courier, monospace; }
        .stat-value em { font-style: normal; color: var(--accent); }

        /* 怪物状态列表 */
        #enemyStatsList { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        
        .enemy-stat-row {
            background: rgba(0,0,0,0.2);
            padding: 10px 14px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; border-left: 4px solid transparent;
        }

        /* 底部说明与按钮 */
        .controls-info {
            font-size: 12px; color: #555; line-height: 1.8;
            padding: 15px; background: rgba(0,0,0,0.1); border-radius: 12px;
            margin-top: auto;
        }

        .reset-btn {
            background: var(--danger); border: none; color: white; padding: 16px;
            border-radius: 12px; cursor: pointer; margin-top: 15px;
            font-weight: bold; font-size: 16px; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.2);
        }
        .reset-btn:hover { background: #ff4d6d; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(233, 69, 96, 0.4); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-bubbles" id="bubbles"></div>

    <div id="mainMenu">
        <div class="logo-area">
            <h1>BOOM!</h1>
            <p>Q 版 泡 泡 堂 · 宏 伟 战 场</p>
        </div>
        
        <div class="level-card-list">
            <div class="level-card" onclick="initGame(1)">
                <i>🌲</i>
                <h3>初学者森林</h3>
                <span>难度：★☆☆☆☆<br>地图：25 x 25</span>
            </div>
            <div class="level-card" onclick="initGame(2)">
                <i>🏭</i>
                <h3>时空工厂</h3>
                <span>难度：★★★☆☆<br>地图：31 x 31</span>
            </div>
            <div class="level-card" onclick="initGame(3)">
                <i>❄️</i>
                <h3>寒冰迷宫</h3>
                <span>难度：★★★★★<br>地图：25 x 25</span>
            </div>
        </div>
    </div>

    <div class="game-container" id="gameUI">
        <canvas id="gameCanvas"></canvas>
        
        <div class="panel">
            <div class="section-title">我的状态</div>
            <div class="stat-card">
                <span class="stat-label">Power 爆炸威力</span>
                <span class="stat-value"><em id="powerVal">1</em> 层</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Capacity 炸弹上限</span>
                <span class="stat-value"><em id="bombMaxVal">1</em> 枚</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Match Score 比赛得分</span>
                <span id="scoreVal" class="stat-value">0</span>
            </div>

            <div class="section-title">竞技场幸存者</div>
            <div id="enemyStatsList">
                </div>

            <div class="controls-info">
                <strong>⌨️ 操作指南</strong><br>
                移动：方向键 ↑↓←→<br>
                投放：Space 空格键<br>
                策略：炸开木箱可拾取强化道具
            </div>

            <button class="reset-btn" onclick="location.reload()">放弃战斗</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
    
    <script>
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            const size = Math.random() * 60 + 20;
            bubble.style.cssText = `
                position: absolute;
                bottom: -100px;
                left: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                background: rgba(78, 204, 163, 0.1);
                border-radius: 50%;
                animation: float ${Math.random() * 10 + 5}s infinite ease-in;
                animation-delay: ${Math.random() * 5}s;
            `;
            bubblesContainer.appendChild(bubble);
        }
        // 动态气泡动画样式
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes float {
                0% { transform: translateY(0) rotate(0deg); opacity: 0; }
                20% { opacity: 0.6; }
                100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
